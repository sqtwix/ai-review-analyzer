services:
  api-core:
    build:
      context: ./api-core/ApiCore/ApiCore
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__ExpiryMinutes=${JWT_EXPIRY_MINUTES}
      - AiDriver__Url=http://ai-driver:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_OFFLINE_MODE: ${VITE_OFFLINE_MODE:-false}
    ports:
      - "80:80"
    depends_on:
      - api-core
    networks:
      - saas-network

  postgres:
    image: postgres:15-alpine
    container_name: aichecker-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s  # Проверять каждые 3 секунды
      timeout: 3s   # Таймаут на ответ
      retries: 10   # Сколько раз пытаться до того, как признать контейнер упавшим
    networks:
      - saas-network

  ai-driver:
    build:
      context: ./ai-driver
    ports:
      - "8000:8000"
    environment:
      # DeepSeek конфигурация
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # SberGPT конфигурация
      - SBERGPT_API_KEY=${SBERGPT_API_KEY}
      - SBERGPT_BASE_URL=${SBERGPT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1/}
      - SBERGPT_MODEL=${SBERGPT_MODEL:-GigaChat-Pro}
      # Локальная Qwen модель (llama.cpp)
      - QWEN_LOCAL_URL=http://qwen-local:8080/v1
      - QWEN_LOCAL_MODEL=${QWEN_LOCAL_MODEL:-local-model}
    depends_on:
      qwen-local:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - saas-network
    restart: unless-stopped

  # Сервис с локальной моделью через llama.cpp
  qwen-local:
    build:
      context: ./llama-cpp
      dockerfile: Dockerfile
    ports:
      - "8001:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - MODEL_PATH=/models/Qwen3.5-0.8B-Q8_0.gguf
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - N_CTX=8192
      - N_GPU_LAYERS=0
      - N_THREADS=4
      - BATCH_SIZE=512
      - MODEL_ALIAS=local-model
    # НАСТРОЙКА HEALTHCHECK (чтобы ai-driver не стучался в не прогретую модель)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # Даем модели время загрузиться в оперативную память при старте
    networks:
      - saas-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - saas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres_data:

networks:
  saas-network:
    driver: bridge
